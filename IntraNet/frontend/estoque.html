<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="sidebar_header.js"></script>
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="styleag_es.css">
    <title>Estoque</title>
</head>

<body class="fundo-escuro">

<div class="d_util">
    <h2 class="h_ag">Estoque</h2>
    <button id="b_addq">
      <span id="s_addq">Adicionar Quantidade</span>
    </button>
    <div id="d_inp">
    <div class="busca-box">
        <img src="images/lupa.png" class="icone-busca">
        <input type="text" id="inputBusca" placeholder="Buscar por nome ou código...">
    </div>
</div>
</div>

<section id="sc_tabela" class="container mt-5">
    <table class="tabela">
<table class="tabela">
    <thead>
        <tr>
            <th>Código</th>
            <th>Produto</th>
            <th>Categoria</th>
            <th>Preço</th>
            <th>Quantidade</th>
        </tr>
    </thead>
    <tbody id="tb_tbl_produtos"></tbody>
</table>

<dialog id="d_modal">
    <div class="modal_box">

        <h2>Atualizar Quantidade</h2>

        <input type="text" id="inp_busca_modal" placeholder="Código ou nome">
        <ul id="lista_sugestoes"></ul>

        <p>Selecionado: <span id="s_produto">---</span></p>
        <p>Qtd atual: <span id="s_qtda">0</span></p>

        <input type="number" id="inp_add_qtd" value="0">

        <button id="b_addf" type="button">Adicionar</button>

    </div>
</dialog>

<script>
const modal = document.getElementById("d_modal");
const b_addq = document.getElementById("b_addq");
const b_addf = document.getElementById("b_addf");
const tabela = document.getElementById("tb_tbl_produtos");

const inpBuscaModal = document.getElementById("inp_busca_modal");
const lista = document.getElementById("lista_sugestoes");

let produtosCache = [];
let indexSelecionado = -1;

// abrir modal
b_addq.addEventListener("click", () => {
    limparModal();
    modal.showModal();
});

// 🔥 ÚNICO EVENTO (corrigido)
b_addf.addEventListener("click", async () => {
    const codigo = inpBuscaModal.dataset.codigo;

    if (!codigo) {
        alert("Selecione um produto");
        return;
    }

    const qtdAdd = Number(document.getElementById("inp_add_qtd").value);
    if (qtdAdd <= 0) return alert("Quantidade inválida");

    await fetch(`http://localhost:3000/produtos/${codigo}/add`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ quantidade: qtdAdd })
    });

    modal.close();
    limparModal();
    carregarProdutos();
});

function limparModal() {
    inpBuscaModal.value = "";
    inpBuscaModal.dataset.codigo = "";
    document.getElementById("s_produto").innerText = "---";
    document.getElementById("s_qtda").innerText = "0";
    document.getElementById("inp_add_qtd").value = 0;
    lista.innerHTML = "";
}

// carregar tabela
async function carregarProdutos() {
    const res = await fetch("http://localhost:3000/produtos");
    const produtos = await res.json();

    produtosCache = produtos;
    tabela.innerHTML = "";

    produtos.forEach(p => {
        tabela.innerHTML += `
            <tr>
                <td>${p.codigo_barras || ""}</td>
                <td>${p.nome || ""}</td>
                <td>${p.categoria_nome || ""}</td>
                <td>R$ ${parseFloat(p.preco || 0).toFixed(2)}</td>
                <td>${p.qtd || 0}</td>
            </tr>
        `;
    });
}

// autocomplete
inpBuscaModal.addEventListener("input", () => {
    const termo = inpBuscaModal.value.toLowerCase();
    lista.innerHTML = "";

    const filtrados = produtosCache.filter(p =>
        (p.nome || "").toLowerCase().includes(termo) ||
        (p.codigo_barras || "").startsWith(termo)
    ).slice(0, 5);

    filtrados.forEach(p => {
        const li = document.createElement("li");
        li.textContent = p.nome;

        li.onclick = () => {
            inpBuscaModal.value = p.nome;
            inpBuscaModal.dataset.codigo = p.codigo_barras;

            document.getElementById("s_produto").innerText = p.nome;
            document.getElementById("s_qtda").innerText = p.qtd || 0;

            lista.innerHTML = "";
        };

        lista.appendChild(li);
    });
});

document.addEventListener("DOMContentLoaded", carregarProdutos);
</script>

</body>
</html>
