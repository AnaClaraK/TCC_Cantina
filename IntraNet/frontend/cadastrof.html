<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <script src="sidebar_header.js"></script>
    <link rel="stylesheet" href="stylelog.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="stylecadp.css">
</head>
<body>
    <div class="container">
        <div class="quadrado">
            <h1 class="lb_cad">Cadastro</h1>
            <div class="container-respostas">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" class="inp_p" placeholder="Seu nome">
                
                <label for="email">E-mail</label>
                <input type="email" id="email" class="inp_p" placeholder="Digite o email">
                
                <label for="senha">Senha</label>
                <input type="password" id="senha" class="inp_p" placeholder="Digite a senha">
                
                <label for="confsenha">Confirmar Senha</label>
                <input type="password" id="confsenha" class="inp_p" placeholder="Confirme a senha">
                
                <label>Foto de Perfil</label>
                <input type="file" id="foto_perfil" class="inp_p" accept="image/*">
            </div>

            <div class="container-fim">
                <p id="respostas" class="respostas"></p>
            </div>

            <button id="btn_cadas" class="btn_cadas">Cadastrar</button> 
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const btnCadas = document.getElementById("btn_cadas");

        btnCadas.addEventListener("click", async () => {    
            const nome = document.getElementById("nome").value;
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const confsenha = document.getElementById("confsenha").value;
            const foto = document.getElementById("foto_perfil").files[0];
            
            const pMessageEl = document.getElementById("respostas");
            const containerFimEl = document.querySelector(".container-fim");

            if (senha !== confsenha) {
                pMessageEl.innerText = "As senhas não coincidem!";
                containerFimEl.classList.add('container-fim-error');
                return;
            }

            // Usamos FormData para enviar arquivo (imagem)
            const formData = new FormData();
            formData.append("nome", nome);
            formData.append("email", email);
            formData.append("senha", senha);
            formData.append("confsenha", confsenha);
            if(foto) formData.append("imagem", foto);

            pMessageEl.innerText = "Realizando cadastro...";
            
            try {
                const resposta = await fetch(`http://localhost:3000/cadastro`, {
                    method: "POST",
                    body: formData // Sem headers de Content-Type aqui, o browser faz sozinho
                });

                const dados = await resposta.json();

                if (resposta.ok) {
                    containerFimEl.classList.remove('container-fim-error');
                    containerFimEl.classList.add('container-fim-success');
                    pMessageEl.innerText = "Sucesso! Redirecionando...";
                    
                    setTimeout(() => {
                        window.location.href = 'login.html'; 
                    }, 1500);

                } else {
                    containerFimEl.classList.add('container-fim-error');
                    pMessageEl.innerText = dados.resposta || "Erro ao realizar cadastro.";
                }
            } catch (error) {
                containerFimEl.classList.add('container-fim-error');
                pMessageEl.innerText = "Erro de conexão com o servidor.";
            }
        });
    });
    </script>
</body>
</html>
