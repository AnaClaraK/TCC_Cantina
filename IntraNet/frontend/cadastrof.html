<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    <script src="sidebar_header.js"></script>
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="stylecadp.css">
</head>
<body class="fundo-escuro"> <main class="main-cadastro">
        <div class="quadrado"> <form id="formFuncionario">
                <h2 class="lb_cad">Cadastro de Funcionário</h2>

                <div class="container-respostas">
                    <label class="lb_" for="email">E-mail</label>
                    <input type="email" id="email" class="inp_p" placeholder="Digite o email para cadastro" required>
                    
                    <label for="senha" >Senha</label>
                    <input type="password" id="senha" class="inp_p" placeholder="Digite a senha da conta" required>
                    
                    <label for="confsenha">Confirmar Senha</label>
                    <input type="password" id="confsenha" class="inp_p" placeholder="Confirme a senha" required>
                </div>

                <div class="container-fim">
                    <p id="respostas" class="respostas"></p>
                </div>

                <button type="submit" id="btn_cadas" class="btn-form">Cadastrar</button>
            </form>
        </div>
    </main>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const formFunc = document.getElementById("formFuncionario");
        const pMessageEl = document.getElementById("respostas");
        const containerFimEl = document.querySelector(".container-fim");

        formFunc.addEventListener("submit", async (e) => { 
            e.preventDefault(); // Previne o refresh da página
            
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const confsenha = document.getElementById("confsenha").value;

            // Validação de senha
            if (senha !== confsenha) {
                pMessageEl.innerText = "As senhas não coincidem!";
                pMessageEl.style.color = "red";
                containerFimEl.classList.add('container-fim-error');
                return;
            }
            
            pMessageEl.innerText = "Realizando cadastro...";
            pMessageEl.style.color = "white"; 
            
            try {
                const resposta = await apiFetch(`http://localhost:3000/cadastro`, {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({"email": email, "senha": senha})
                });

                if (resposta.ok) {
                    containerFimEl.classList.remove('container-fim-error');
                    containerFimEl.classList.add('container-fim-success');
                    pMessageEl.innerText = "Cadastro realizado com sucesso! Redirecionando...";
                    pMessageEl.style.color = "green";
                    
                    setTimeout(() => {
                        window.location.href = 'index.html'; 
                    }, 1500);

                } else {
                    pMessageEl.innerText = "Erro ao cadastrar funcionário.";
                    pMessageEl.style.color = "red";
                }

            } catch (error) {
                containerFimEl.classList.add('container-fim-error');
                pMessageEl.innerText = "Erro de conexão com o servidor.";
                pMessageEl.style.color = "red";
                console.error("Erro de rede:", error);
            }
        });
    });
    </script>
</body>
</html>
