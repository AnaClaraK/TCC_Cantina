<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="stylecadp.css">
    <script src="sidebar_header.js"></script>
</head>
<body class="fundo-escuro">
    <main class="main-cadastro">
        <form id="formFuncionario" enctype="multipart/form-data">
            <h2>Cadastro de Funcionário</h2>

            <input type="email" name="email" id="email" class="inp_p" placeholder="E-mail" required>
            <input type="password" name="senha" id="senha" class="inp_p" placeholder="Senha" required>
            <input type="password" id="confsenha" class="inp_p" placeholder="Confirmar Senha" required>

            <label class="file-label">
                Escolher foto de perfil
                <input type="file" name="foto" id="inputImagem" accept="image/*">
            </label>

            <img id="preview">

            <p id="respostas" class="respostas"></p>

            <button type="submit" class="btn-form">Finalizar Cadastro</button>
        </form>
    </main>

    <script>
        const inputImagem = document.getElementById("inputImagem");
        const preview = document.getElementById("preview");
        const form = document.getElementById("formFuncionario");
        const msg = document.getElementById("respostas");

        // Preview da imagem
        inputImagem.addEventListener("change", () => {
            const file = inputImagem.files[0];
            if(file){
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        });

        // Envio do formulário
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const senha = document.getElementById("senha").value;
            const conf = document.getElementById("confsenha").value;

            if(senha !== conf) {
                msg.innerText = "As senhas não coincidem!";
                msg.style.color = "red";
                return;
            }

            const formData = new FormData(form);
            msg.innerText = "Enviando...";
            msg.style.color = "black";

            try {
                const res = await fetch("http://localhost:3000/cadastro", {
                    method: "POST",
                    body: formData
                });

                if(res.ok) {
                    msg.innerText = "Cadastrado com sucesso!";
                    msg.style.color = "green";
                    setTimeout(() => window.location.href = "index.html", 1500);
                } else {
                    msg.innerText = "Erro ao cadastrar funcionário.";
                    msg.style.color = "red";
                }
            } catch (err) {
                msg.innerText = "Erro de conexão com servidor.";
                msg.style.color = "red";
            }
        });
    </script>
</body>
</html>
