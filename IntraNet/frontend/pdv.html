<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV - Sistema Cantina</title>
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="stylepdv.css">
    <script src="sidebar_header.js"></script>
</head>
<body class="sem-sidebar fundo-marrom">

<section id="sc_inputs">
    <div class="grupo-input" style="grid-column: 1 / span 3;">
        <h2 class="titulo">Código do Produto</h2> 
        <input type="text" id="inp_codb" autofocus>
    </div>

    <div class="grupo-input">
        <h2 id="h_qtd" class="titulo">Quantidade</h2>
        <div id="d_qtd" class="inp_val">0</div>
    </div>

    <div class="grupo-input">
        <h2 id="h_vl_und" class="titulo">Valor Unitário</h2>
        <div id="d_vl_und" class="inp_val">R$ 0,00</div>
    </div>

    <div class="grupo-input">
        <h2 id="h_ttl_i" class="titulo">Total do Item</h2>  
        <div id="d_ttl_i" class="inp_val">R$ 0,00</div>
    </div>

    <img src="images/img_ntf.png" alt="imagem produto" id="img_prod">

    <div class="grupo-input" style="grid-column: 3; align-self: start;">
        <h2 id="h_ttl_c" class="titulo">Total da Compra</h2>
        <div id="d_ttl_c" class="inp_val">R$ 0,00</div>
    </div>
</section>

<section id="sc_tabela">
    <table>
        <thead>
            <tr>
                <th scope="col">Código</th>
                <th scope="col">Nome</th>
                <th scope="col">Quantidade</th>
                <th scope="col">Preço</th>
            </tr>
        </thead>
        <tbody id="tb_tbl_produtos">
        </tbody>
    </table>
</section>

<section id="sc_modal">
  <button id="b_final" disabled>
    <span id="s_final">Finalizar Compra</span>
  </button>

  <dialog id="d_modal">
    <article>
        <section>
            <div>
                <h2>Venda Finalizada</h2>
                <h2>Pedido n°</h2>
                <span id="s_pedido">001</span>
                <h2>Data e Hora</h2>
                <span id="s_dt"></span>
                <h2>Total da Compra</h2>
                <span id="s_tot">R$ 0,00</span>
                
                <h2>Forma de Pagamento</h2> 
                <button class="pagamento" id="pg_dinheiro">Dinheiro (F2)</button>
                <button class="pagamento" id="pg_credito">Cartão de Crédito (F3)</button>
                <button class="pagamento" id="pg_debito">Cartão de Débito (F4)</button>
                <button class="pagamento" id="pg_pix">PIX (F5)</button>
            </div>
        </section>
        <footer>
            <button id="b_nv_venda" disabled>Nova Venda (F6)</button>
        </footer>
      </article>
  </dialog>

  <button id="b_agend">Agendamento</button>
  <button id="b_canc">Cancelar(ESC)</button>
</section>

<div id="erro_overlay">
    <div id="erro_box">PRODUTO NÃO CADASTRADO</div>
</div>

<script>
    // Seletores
    const inp_codb = document.getElementById("inp_codb");
    const tbody = document.getElementById("tb_tbl_produtos");
    const img_prod = document.getElementById("img_prod");
    const b_final = document.getElementById("b_final");
    const modal = document.getElementById("d_modal");
    const nova_venda = document.getElementById("b_nv_venda");
    
    // Configurações
    const URL_BACKEND_CAD = "http://localhost:3000";
    const IMG_PADRAO = "images/img_ntf.png";

    let carrinho = {}; 
    let totalCompra = 0; 

    // Funções de Auxílio
    function formatar(valor) {
        return Number(valor).toFixed(2).replace(".", ",");
    }

    function atualizarTotalCompra() {
        totalCompra = 0;
        Object.values(carrinho).forEach(item => {
            totalCompra += item.preco * item.qtd;
        });
        const totalFormatado = "R$ " + formatar(totalCompra);
        document.getElementById("d_ttl_c").innerText = totalFormatado;
        document.getElementById("s_tot").innerText = totalFormatado;
    }

    function atualizarVisores(item) {
        document.getElementById("d_qtd").innerText = item.qtd;
        document.getElementById("d_vl_und").innerText = "R$ " + formatar(item.preco);
        document.getElementById("d_ttl_i").innerText = "R$ " + formatar(item.preco * item.qtd);
    }

    function verificarBotao(){
        b_final.disabled = (Object.keys(carrinho).length === 0);
    }

    // Evento de busca de produto
    inp_codb.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        const codigo = inp_codb.value.trim();
        if (!codigo) return;

        fetch(`${URL_BACKEND_CAD}/produtos/${codigo}`)
        .then(res => {
            if (!res.ok) throw new Error("Produto não encontrado");
            return res.json();
        })
        .then(data => {
            const produto = data[0];

            if (produto.img) {
                img_prod.src = URL_BACKEND_CAD + "/" + produto.img;
            } else {
                img_prod.src = IMG_PADRAO;
            }

            if (carrinho[codigo]) {
                carrinho[codigo].qtd++;
                const linha = document.getElementById("linha_" + codigo);
                linha.querySelector(".qtd-col").innerText = carrinho[codigo].qtd;
            } else {
                carrinho[codigo] = {
                    codigo: produto.codigo_barras,
                    nome: produto.nome,
                    preco: Number(produto.preco),
                    qtd: 1
                };

                const tr = document.createElement("tr");
                tr.id = "linha_" + codigo;
                tr.innerHTML = `
                    <td>${produto.codigo_barras}</td>
                    <td>${produto.nome}</td>
                    <td class="qtd-col">1</td>
                    <td>R$ ${formatar(produto.preco)}</td>
                `;
                tbody.appendChild(tr);
            }
            atualizarVisores(carrinho[codigo]);
            atualizarTotalCompra();
            verificarBotao();
            inp_codb.value = "";
        })
        .catch(err => {
            console.error(err);
            document.getElementById("erro_overlay").style.display = "flex";
            img_prod.src = IMG_PADRAO;
            inp_codb.value = "";
            setTimeout(() => {
                document.getElementById("erro_overlay").style.display = "none";
            }, 1500);
        });
    });

    b_final.addEventListener("click", () => {
        document.getElementById("s_dt").innerText = new Date().toLocaleString();
        modal.showModal();
    });

    document.querySelectorAll(".pagamento").forEach(botao => {
        botao.addEventListener("click", () => {
            nova_venda.disabled = false;
        });
    });

    function resetarPDV() {
        carrinho = {};
        tbody.innerHTML = "";
        totalCompra = 0;
        document.getElementById("d_qtd").innerText = "0";
        document.getElementById("d_vl_und").innerText = "R$ 0,00";
        document.getElementById("d_ttl_i").innerText = "R$ 0,00";
        document.getElementById("d_ttl_c").innerText = "R$ 0,00";
        inp_codb.value = "";
        img_prod.src = IMG_PADRAO;
        verificarBotao();
        if(modal.open) modal.close();
        nova_venda.disabled = true;
    }

    nova_venda.addEventListener("click", resetarPDV);
    document.getElementById("b_canc").addEventListener("click", resetarPDV);

    window.addEventListener("keydown", (e) => {
        if(e.key === "Escape") resetarPDV();
    });
    // =============================
// ATALHOS TECLADO (F1 - F6)
// =============================
window.addEventListener("keydown", (e) => {

switch(e.key){

    case "F1":
        e.preventDefault();
        if(!b_final.disabled) b_final.click();
    break;

    case "F2":
        e.preventDefault();
        if(modal.open) document.getElementById("pg_dinheiro").click();
    break;

    case "F3":
        e.preventDefault();
        if(modal.open) document.getElementById("pg_credito").click();
    break;

    case "F4":
        e.preventDefault();
        if(modal.open) document.getElementById("pg_debito").click();
    break;

    case "F5":
        e.preventDefault();
        if(modal.open) document.getElementById("pg_pix").click();
    break;

    case "F6":
        e.preventDefault();
        if(!nova_venda.disabled) nova_venda.click();
    break;

    case "F7":
         e.preventDefault();
         document.getElementById("b_agend").click();
    break; 

}
});
</script>
</body>
</html>
