<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV</title>
    <link rel="stylesheet" href="stylepdv.css">
</head>
<body>

<section id="sc_inputs">
    <h2 class="titulo">Código do Produto</h2> 
    <input type="text" id="inp_codb">

    <h2 id="h_qtd" class="titulo">Quantidade</h2>
    <div id="d_qtd" class="inp_val">0</div>

    <h2 id="h_vl_und" class="titulo">Valor Unitário</h2>
    <div id="d_vl_und" class="inp_val">R$ 0,00</div>

    <h2 id="h_ttl_i" class="titulo">Total do Item</h2>  
    <div id="d_ttl_i" class="inp_val">R$ 0,00</div>

    <h2 id="h_ttl_c" class="titulo">Total da Compra</h2>
    <div id="d_ttl_c" class="inp_val">R$ 0,00</div>

    <img alt="imagem" id="img_prod">
</section>

<section id="sc_tabela">
    <table>
        <thead>
            <tr>
                <th scope="col">Código</th>
                <th scope="col">Nome</th>
                <th scope="col">Quantidade</th>
                <th scope="col">Preço</th>
            </tr>
        </thead>
        <tbody id="tb_tbl_produtos">
            </tbody>
    </table>
</section>

<section id="sc_modal">
  <button id="b_final" disabled>
    <span id="s_final">Finalizar Compra</span>
  </button>
  <dialog id="d_modal">
    <article>
        <section>
            <div>
                <h2>Venda Finalizada</h2>
                <h2>Pedido n°</h2>
                <span id="s_pedido"></span>
                <h2>Data e Hora</h2>
                <span id="s_dt"></span>
                <h2>Total da Compra</h2>
                <span id="s_tot"></span>
                <h2>Forma de Pagamento</h2> 
                <button id="b_din" class="pagamento">Dinheiro</button>
                <button id="b_cart_cred" class="pagamento">Cartão de Crédito</button>
                <button id="b_cart_deb" class="pagamento">Cartão de Débito</button>
                <button id="b_pix" class="pagamento">PIX</button>
            </div>
        </section>
        <footer>
            <div>
              <button id="b_nv_venda" disabled>
                <span>Nova Venda</span>
              </button>
            </div>
        </footer>
      </article>
  </dialog>

  <button id="b_agend">Agendamento</button>
  <button id="b_canc">Cancelar(ESC)</button>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
