<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="stylelog.css">
</head>
<body>
    <div class="container">
        <div class="quadrado">
            <h1 class="lb_login">Login</h1>
            <div class="container-respostas">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu email">
                <br><br>
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Sua senha">
            </div>
            <div class="container-fim">
                <p id="respostas" class="respostas"></p>
            </div>
            <button id="btn_entrar" class="btn_entrar">Entrar</button>
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const btnEntrar = document.getElementById("btn_entrar");

        btnEntrar.addEventListener("click", async () => {    
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const pMessageEl = document.getElementById("respostas");
            const containerFimEl = document.querySelector(".container-fim");

            pMessageEl.innerText = "Validando...";
            
            try {
                const resposta = await fetch(`http://localhost:3000/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await resposta.json();

                if (resposta.ok) {
                    containerFimEl.classList.add('container-fim-success');
                    pMessageEl.innerText = "Login realizado!";

                    // SALVA OS DADOS DO BANCO NO NAVEGADOR
                    localStorage.setItem("usuarioNome", dados.usuario.nome);
                    localStorage.setItem("usuarioFoto", dados.usuario.foto);
                    localStorage.setItem("usuarioEmail", dados.usuario.email);

                    // Redireciona após salvar
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);

                } else {
                    containerFimEl.classList.add('container-fim-error');
                    pMessageEl.innerText = dados.resposta || "Erro no login.";
                }

            } catch (error) {
                containerFimEl.classList.add('container-fim-error');
                pMessageEl.innerText = "Erro ao conectar com servidor.";
            }
        });
    });
    </script>
</body>
</html>
