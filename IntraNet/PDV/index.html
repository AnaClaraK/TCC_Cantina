<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Cantina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="sc_inputs">
    <label>Código do Produto</label> <input type="text" id="inp_codb">

    <h2 id="h_qtd">Quantidade</h2>
    <div id="d_qtd">0</div>

    <h2 id="h_vl_und">Valor Unitário</h2>
    <div id="d_vl_und">R$ 0,00</div>

    <h2 id="h_ttl_i">Total do Item</h2>  
    <div id="d_ttl_i">R$ 0,00</div>

    <h2 id="h_ttl_c">Total da Compra</h2>
    <div id="d_ttl_c">R$ 0,00</div>

    <h2 id="h_foto">Foto do Produto</h2>
    <img alt="imagem" id="img_prod" width="150" height="150">
</section>

<section id="sc_tabela">
    <table class="table table-striped table-hover border">
        <thead class="table-dark">
            <tr>
                <th scope="col">Código</th>
                <th scope="col">Nome</th>
                <th scope="col">Quantidade</th>
                <th scope="col">Preço</th>
            </tr>
        </thead>
        <tbody id="tb_tbl_produtos">
        </tbody>
    </table>
</section>

<section id="sc_modal">
  <button id="b_final">
    <span>Finalizar Compra</span>
  </button>
  <dialog id="d_modal">
    <article>
        <header>
          <div>
            Finalizar Compra
          </div>
        </header>
        <section>
            <div>
                <h2>Venda Finalizada</h2>
                <h2>Pedido n°</h2>
                <span id="s_pedido"></span>
                <h2>Data e Hora</h2>
                <span id="s_dt"></span>
                <h2>Total da Compra</h2>
                <span id="s_tot"></span>
                <h2>Forma de Pagamento</h2> <!--Por aquela ista de escolha-->
              <button id="b_din">Dinheiro</button>
              <button id="b_cart_cred">Cartão de Crédito</button>
              <button id="b_cart_deb">Cartão de Débito</button>
              <button id="b_pix">PIX</button>
            </div>
        </section>
          <footer>
            <div>
              <button id="b_nv_venda">
                <span>Nova Venda</span>
              </button>
            </div>
          </footer>
      </article>
  </dialog>

  </div>

  <button id="bt_agend">Agendamento</button>
  <button id="bt_canc">Cancelar(ESC)</button>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const inp_codb = document.getElementById("inp_codb");
const tbody = document.getElementById("tb_tbl_produtos");
const img_prod = document.getElementById("img_prod");

let carrinho = {}; // objeto vazio (guarda várias informações organizadas) ele organiza por nme/id
let totalCompra = 0; // guarda o valor incial da comrpa q é 0

function formatar(valor) {
  return Number(valor).toFixed(2).replace(".", ","); //troca a , por .
}

function atualizarTotalCompra() {
  totalCompra = 0;
  Object.values(carrinho).forEach(item => {
    totalCompra += item.preco * item.qtd;
  });
  document.getElementById("d_ttl_c").innerText = "R$ " + formatar(totalCompra);
}

function atualizarVisores(item) {
  document.getElementById("d_qtd").innerText = item.qtd;
  document.getElementById("d_vl_und").innerText = "R$ " + formatar(item.preco);
  document.getElementById("d_ttl_i").innerText = "R$ " + formatar(item.preco * item.qtd);
}

const URL_BACKEND_CAD = "http://localhost:3002"; // backend de cadastro, porta 3002

inp_codb.addEventListener("keydown", (event) => {
  if (event.key !== "Enter") return;

  const codigo = inp_codb.value.trim();
  if (!codigo) return;

  fetch(`${URL_BACKEND_CAD}/produtos/${codigo}`)
    .then(res => res.json())
    .then(data => {
      const produto = data[0];
      if (!produto) return;

      img_prod.src = URL_BACKEND_CAD + produto.img;

      if (carrinho[codigo]) {
        carrinho[codigo].qtd++;
        const linha = document.getElementById("linha_" + codigo);
        linha.querySelector(".qtd").innerText = carrinho[codigo].qtd;
      } else {
        carrinho[codigo] = {
          codigo: produto.codigo_barras,
          nome: produto.nome,
          preco: Number(produto.preco),
          qtd: 1
        };
        const tr = document.createElement("tr"); //cria a linha na tabela
        tr.id = "linha_" + codigo; //põe o código dentro dela(linha abaixo)
        tr.innerHTML = `
          <td>${produto.codigo_barras}</td>
          <td>${produto.nome}</td>
          <td class="qtd">1</td>
          <td>R$ ${Number(produto.preco).toFixed(2).replace(".", ",")}</td>
        `;
        tbody.appendChild(tr); // adiciona a linha na tabela
      }

      atualizarVisores(carrinho[codigo]);
      atualizarTotalCompra();
      inp_codb.value = "";//limpa o input do código
    })
    .catch(err => console.error("Erro ao buscar produto:", err));
});

function abrirModal(total) {
  document.getElementById("totalVenda").innerText = total;
  document.getElementById("modalFinalizar").style.display = "flex";
}
// -----------------------------
const b_abrir = document.querySelector("#b_final")
const modal = document.querySelector("#d_modal")
const b_fechar = document.querySelector("#b_nv_venda")

b_abrir.addEventListener("click", (e) =>{
  modal.showModal();
})

b_fechar.addEventListener("click", (e) =>{
  modal.close();
})
</script>

</body>
</html>
